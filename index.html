<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cholo Eid Card Banai!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #FFF9F0; }
        .sketchbook-font { font-family: 'Gochi Hand', cursive; }
        .hand-drawn {
            border: 2px solid #3e2723;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden flex flex-col items-center p-6">

    <div class="absolute top-0 left-0 w-full h-40 bg-[#E3F2FD] -z-10 rounded-b-[50px] shadow-sm"></div>
    <div class="absolute top-8 left-1/2 -translate-x-1/2 flex items-center gap-10 text-[#FFD740] opacity-60 text-3xl">
        <span>🌙</span> <span>🏮</span> <span>🌙</span>
    </div>

    <header class="text-center mt-4 mb-10">
        <h1 class="text-4xl font-bold text-[#3e2723] sketchbook-font">Cholo Eid Card Banai!</h1>
        <p class="text-[#8d6e63] text-xs tracking-widest uppercase">Pastel GPO • Eid 2026</p>
    </header>

    <main class="flex flex-col lg:flex-row items-center justify-center gap-12 w-full max-w-5xl">
        
        <div class="perspective w-[300px] h-[440px]">
            <div id="mainCard" class="card-inner w-full h-full relative cursor-pointer" onclick="this.classList.toggle('flipped')">
                <div class="absolute inset-0 backface-hidden bg-white hand-drawn p-2">
                    <img src="chota-bheem-front.png" class="w-full h-full object-contain">
                    <img id="stampImg" src="stamp.png" class="absolute top-4 right-4 w-16 rotate-12 opacity-0 transition-opacity duration-300">
                </div>
                <div class="absolute inset-0 backface-hidden bg-[#FFFDF5] hand-drawn p-8 flex flex-col" style="transform: rotateY(180deg);">
                    <p id="cardText" class="text-xl text-[#3e2723] sketchbook-font leading-relaxed mt-10">Your wish here...</p>
                </div>
            </div>
        </div>

        <div class="w-full max-w-xs bg-white/60 p-6 hand-drawn flex flex-col gap-6">
            <div>
                <label class="block text-xs font-bold uppercase text-[#5d4037] mb-2">1. Write Message</label>
                <textarea id="msgInput" oninput="updateText()" class="w-full h-24 bg-transparent border-b border-[#8d6e63] outline-none text-lg sketchbook-font" placeholder="Eid Mubarak!"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-[#5d4037] mb-2">2. Add Stamp</label>
                <button onclick="addStamp()" class="w-12 h-12 border-2 border-[#3e2723] rounded hover:scale-110 transition p-1">
                    <img src="stamp.png" class="w-full h-full object-contain">
                </button>
            </div>
            <div class="flex flex-col items-center">
                <div class="relative w-32 group cursor-pointer" onclick="postCard()">
                    <img src="postbox.png" class="w-full transition-transform group-hover:scale-105">
                    <button class="absolute bottom-2 left-1/2 -translate-x-1/2 bg-white border border-[#3e2723] text-[10px] px-3 py-1 rounded-full font-bold uppercase">Send 📮</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load Sound
        const whoosh = new Howl({ src: ['whoosh.mp3'] });

        function updateText() {
            document.getElementById('cardText').innerText = document.getElementById('msgInput').value || "Your wish here...";
        }

        function addStamp() {
            document.getElementById('stampImg').classList.replace('opacity-0', 'opacity-100');
        }

        function postCard() {
            if (document.getElementById('stampImg').classList.contains('opacity-0')) {
                alert("Please add a stamp first!");
                return;
            }
            // Sound and Animation
            whoosh.play();
            const card = document.getElementById('mainCard');
            card.style.transition = "all 1s cubic-bezier(0.6, -0.28, 0.735, 0.045)";
            card.style.transform = "translateY(-1200px) scale(0.2) rotate(30deg)";
            
            setTimeout(() => {
                alert("Posted! 📮 Eid Mubarak!");
                window.location.reload();
            }, 1100);
        }
    </script>
</body>
</html>
